name: DORA Metrics

on:
  # Run on the 5th of each month after quarter ends
  # Feb 5 (FY Q4), May 5 (FY Q1), Aug 5 (FY Q2), Nov 5 (FY Q3)
  schedule:
    - cron: '0 10 5 2,5,8,11 *'  # 10:00 UTC on the 5th

  # Allow manual trigger with optional date override
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD) - leave empty for last complete quarter'
        required: false
        type: string
      end_date:
        description: 'End date (YYYY-MM-DD) - leave empty for last complete quarter'
        required: false
        type: string

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # ratchet:actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Collect and generate reports
        id: dora
        run: |
          # Determine date range and artifact naming
          if [ -n "${{ inputs.start_date }}" ] && [ -n "${{ inputs.end_date }}" ]; then
            DATE_ARGS="-start ${{ inputs.start_date }} -end ${{ inputs.end_date }}"
            # For custom ranges, use dates + run number to ensure uniqueness
            PERIOD_NAME="custom-${{ inputs.start_date }}-to-${{ inputs.end_date }}-run${{ github.run_number }}"
            IS_SCHEDULED="false"
          else
            DATE_ARGS="-last-quarter"
            # For scheduled/automatic runs, use date (one per day is fine)
            PERIOD_NAME="last-quarter-$(date +%Y%m%d)"
            IS_SCHEDULED="true"
          fi

          echo "period=${PERIOD_NAME}" >> $GITHUB_OUTPUT
          echo "is_scheduled=${IS_SCHEDULED}" >> $GITHUB_OUTPUT

          # Collect data
          go tool stbernard dora collect ${DATE_ARGS}

          # Generate reports
          mkdir -p dora-reports
          go tool stbernard dora report ${DATE_ARGS} -no-color > dora-reports/report.txt
          go tool stbernard dora report ${DATE_ARGS} -format json > dora-reports/report.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display summary
        run: |
          echo "## DORA Metrics Report: ${{ steps.dora.outputs.period }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat dora-reports/report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload quarterly reports
        uses: actions/upload-artifact@v4
        with:
          name: dora-quarterly-${{ steps.dora.outputs.period }}
          path: dora-reports/
          retention-days: 400

      - name: Upload latest quarter (scheduled runs only)
        if: steps.dora.outputs.is_scheduled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dora-latest-quarter
          path: dora-reports/
          retention-days: 400
