name: DORA Metrics

on:
  # Run on the 5th of each month after quarter ends
  # Feb 5 (FY Q4), May 5 (FY Q1), Aug 5 (FY Q2), Nov 5 (FY Q3)
  schedule:
    - cron: '0 10 5 2,5,8,11 *'  # 10:00 UTC on the 5th

  # Allow manual trigger with optional date override
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD) - leave empty for last complete quarter'
        required: false
        type: string
      end_date:
        description: 'End date (YYYY-MM-DD) - leave empty for last complete quarter'
        required: false
        type: string

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # ratchet:actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Build stbernard
        run: |
          cd packages/go/stbernard
          go build -o ${{ runner.temp }}/stbernard .

      - name: Calculate quarter dates
        id: dates
        run: |
          if [ -n "${{ inputs.start_date }}" ] && [ -n "${{ inputs.end_date }}" ]; then
            echo "start=${{ inputs.start_date }}" >> $GITHUB_OUTPUT
            echo "end=${{ inputs.end_date }}" >> $GITHUB_OUTPUT
            echo "period=custom" >> $GITHUB_OUTPUT
          else
            # Calculate most recent complete fiscal quarter (Feb/May/Aug/Nov start)
            current_month=$(date +%m)
            current_year=$(date +%Y)
            
            # Determine which quarter just completed
            if [ $current_month -ge 2 ] && [ $current_month -lt 5 ]; then
              # Feb-Apr: FY Q4 just completed (Nov 1 - Jan 31)
              start_year=$((current_year - 1))
              start="$start_year-11-01"
              end="$current_year-01-31"
              fy_year=$start_year
              quarter="Q4"
            elif [ $current_month -ge 5 ] && [ $current_month -lt 8 ]; then
              # May-Jul: FY Q1 just completed (Feb 1 - Apr 30)
              start="$current_year-02-01"
              end="$current_year-04-30"
              fy_year=$current_year
              quarter="Q1"
            elif [ $current_month -ge 8 ] && [ $current_month -lt 11 ]; then
              # Aug-Oct: FY Q2 just completed (May 1 - Jul 31)
              start="$current_year-05-01"
              end="$current_year-07-31"
              fy_year=$current_year
              quarter="Q2"
            else
              # Nov-Jan: FY Q3 just completed (Aug 1 - Oct 31)
              start="$current_year-08-01"
              end="$current_year-10-31"
              fy_year=$current_year
              quarter="Q3"
            fi
            
            echo "start=$start" >> $GITHUB_OUTPUT
            echo "end=$end" >> $GITHUB_OUTPUT
            echo "period=FY${fy_year}-${quarter}" >> $GITHUB_OUTPUT
          fi

      - name: Collect DORA data
        run: |
          ${{ runner.temp }}/stbernard dora collect \
            -start ${{ steps.dates.outputs.start }} \
            -end ${{ steps.dates.outputs.end }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate DORA report
        run: |
          mkdir -p ${{ runner.temp }}/dora-reports
          
          # Generate text report
          ${{ runner.temp }}/stbernard dora report \
            -start ${{ steps.dates.outputs.start }} \
            -end ${{ steps.dates.outputs.end }} \
            -no-color > ${{ runner.temp }}/dora-reports/report.txt
          
          # Generate JSON report
          ${{ runner.temp }}/stbernard dora report \
            -start ${{ steps.dates.outputs.start }} \
            -end ${{ steps.dates.outputs.end }} \
            -format json > ${{ runner.temp }}/dora-reports/report.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display summary
        run: |
          echo "## DORA Metrics Report: ${{ steps.dates.outputs.period }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Period:** ${{ steps.dates.outputs.start }} to ${{ steps.dates.outputs.end }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ${{ runner.temp }}/dora-reports/report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload DORA reports
        uses: actions/upload-artifact@v4
        with:
          name: dora-metrics-${{ steps.dates.outputs.period }}
          path: ${{ runner.temp }}/dora-reports/
          retention-days: 90
