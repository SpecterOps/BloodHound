name: Collector Version Build Test

on:
  push:
    branches:
      - lfalslev/bed-7545

jobs:
  run-slow-go-tests:
    name: Run Slow Go Tests
    uses: ./.github/workflows/run-slow-go-tests.yml

  resolve-collector-versions:
    name: Resolve Collector Versions
    runs-on: ubuntu-latest
    outputs:
      sharphound_version: ${{ steps.resolve-collector-versions.outputs.sharphound_version }}
      azurehound_version: ${{ steps.resolve-collector-versions.outputs.azurehound_version }}
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5

      - id: resolve-collector-versions
        uses: ./.github/actions/resolve-collector-versions
        with:
          gh_token: ${{ github.token }}

  bloodhound-container-image:
    name: Build and BloodHound Container Image
    needs:
      - run-slow-go-tests
      - resolve-collector-versions
    uses: ./.github/workflows/reusable.build-container-image.yml
    with:
      container_image_repository_name: docker.io/specterops/bloodhound
      build_target: bloodhound
      build_context: .
      image_sbom: true
      image_provenance: mode=max
      build_outputs: type=image,push=false
      dockerfile: dockerfiles/bloodhound.Dockerfile
      image_cache_from: type=gha
      image_cache_to: type=gha,mode=max
      image_flavor: latest=false
      image_tags: |
        type=raw,value=collector-test-${{ github.sha }}
      build_args: |
        checkout_hash=${{ github.sha }}
        SHARPHOUND_VERSION=${{ needs.resolve-collector-versions.outputs.sharphound_version }}
        AZUREHOUND_VERSION=${{ needs.resolve-collector-versions.outputs.azurehound_version }}
        ${{ github.ref_name != 'main' && format('version={0}', github.ref_name) }}
    secrets:
      dockerhub_account: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
      ghcr_account: ${{ github.actor }}
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      gh_access_token: ${{ secrets.GITHUB_TOKEN }}

  confirm-test:
    name: Confirm Collector Test Build
    runs-on: ubuntu-latest
    needs:
      - resolve-collector-versions
      - bloodhound-container-image
    steps:
      - name: Confirm collector versions and build
        run: |
          echo "SharpHound: ${{ needs.resolve-collector-versions.outputs.sharphound_version }}"
          echo "AzureHound: ${{ needs.resolve-collector-versions.outputs.azurehound_version }}"
          echo "Built image reference: ${{ needs.bloodhound-container-image.outputs.image_reference }}"
