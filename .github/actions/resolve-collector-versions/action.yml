name: Resolve Latest Collector Versions
description: |-

  Fetches the latest release versions for SharpHound and AzureHound collectors using the GH /releases/latest endpoint.
inputs:

  gh_token:
    description: GitHub token for API access (increases rate limits)
    required: true
outputs:

  sharphound_version:

    value: ${{ steps.fetch-collector-versions.outputs.sharphound_version }}
    description: The latest stable release version of SharpHound.
  azurehound_version:

    value: ${{ steps.fetch-collector-versions.outputs.azurehound_version }}
    description: The latest stable release version of AzureHound.
runs:

  using: composite
  steps:
    - id: fetch-collector-versions
      name: Fetch Collector Versions
      shell: bash
      run: |
        sharphound_version="$(gh api repos/SpecterOps/SharpHound/releases/latest --jq .tag_name)"
        azurehound_version="$(gh api repos/SpecterOps/AzureHound/releases/latest --jq .tag_name)"

        # Output versions
        echo "sharphound_version=${sharphound_version}" >> "${GITHUB_OUTPUT}"
        echo "azurehound_version=${azurehound_version}" >> "${GITHUB_OUTPUT}"

        # Log for visibility
        echo "::notice::Using SharpHound ${sharphound_version}"
        echo "::notice::Using AzureHound ${azurehound_version}"
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
