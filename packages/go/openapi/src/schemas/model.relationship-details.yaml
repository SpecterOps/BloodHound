type: object
required:
  - relationship_id
  - source_node_id
  - target_node_id
  - kind
  - properties
properties:
  relationship_id:
    type: integer
    format: int64
    readOnly: true
    example: 1234567890
  source_node_id:
    type: integer
    format: int64
    readOnly: true
    example: 1234567890
  target_node_id:
    type: integer
    format: int64
    readOnly: true
    example: 1234567890
  kind:
    type: object
    required:
      - relationship_kind_id
      - name
    properties:
      relationship_kind_id:
        type: integer
        format: int32
        nullable: true
      name:
        type: string
  properties:
    type: object
    additionalProperties: true
    required:
      - is_traversable
      - lastSeen
    properties:
      is_traversable:
        type: boolean
      lastSeen:
        type: string
        format: date-time
