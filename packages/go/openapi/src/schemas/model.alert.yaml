type: object
description: |
  Alert resource — a named, user-managed rule with an embedded set of
  subscriptions that bind it to channels (e.g. webhooks) for specific event types.
properties:
  id:
    type: string
    format: uuid
  name:
    type: string
  description:
    type: string
  created_at:
    type: string
    format: date-time
  created_by:
    type: string
  updated_at:
    type: string
    format: date-time
  updated_by:
    type: string
  disabled_at:
    $ref: './null.time.yaml'
  disabled_by:
    $ref: './null.string.yaml'
  subscriptions:
    type: array
    items:
      type: object
      description: |
        Subscription record embedded in the Alert resource. Binds the parent alert to
        a channel for a specific `event_type` and `version`. The parent `alert_id` is
        implied by containment in an `AlertView` and is omitted from this view.
      properties:
        channel_id:
          type: string
          format: uuid
          description: ID of the alert channel (e.g. webhook) this subscription targets.
        event_type:
          type: string
        version:
          type: string
          description: Payload schema version this subscription targets.
        created_at:
          type: string
          format: date-time
        disabled_at:
          $ref: './null.time.yaml'
        disabled_by:
          $ref: './null.string.yaml'

