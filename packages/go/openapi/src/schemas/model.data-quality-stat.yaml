allOf:
  - $ref: './model.components.int32.id.yaml'
  - $ref: './model.components.timestamps.yaml'
  - type: object
    properties:
      extension_id:
        type: integer
      environment_kind_id:
        type: integer
      environment_id:
        type: string
      metric_type:
        type: string
        enum: 
          - node
          - relationship
      metric_name:
        type: string
      metric_value:
        type: number
        format: double
      kind_id:
        description: The kind ID for the counted node kind. Present when `metric_type` is `node`; otherwise null.
        type: integer
        format: int32
        nullable: true
      run_id:
        type: string
        format: uuid
