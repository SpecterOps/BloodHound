type: object
description: |
  System-generated delivery attempt for a single `(alert, channel, event)`
  tuple. Read-only via the API. Identity is the composite key
  `(alert_id, channel_id, event_id)`.
properties:
  alert_id:
    type: string
    format: uuid
  channel_id:
    type: string
    format: uuid
  event_id:
    type: string
    format: uuid
  created_at:
    type: string
    format: date-time
  succeeded_at:
    $ref: './null.time.yaml'
  last_status_code:
    $ref: './null.int32.yaml'
  last_error:
    $ref: './null.string.yaml'
  attempts:
    type: integer
    format: int32
    description: Total dispatch attempts fired.
  next_attempt_at:
    $ref: './null.time.yaml'
