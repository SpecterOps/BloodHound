allOf:
  - $ref: './model.components.uuid.yaml'
  - type: object
    properties:
      client_id:
        type: string
        format: uuid
        readOnly: true
      artifact_id:
        readOnly: true
        allOf:
          - $ref: './null.uuid.yaml'
      type:
        readOnly: true
        allOf:
          - $ref: './enum.client-management-operation-type.yaml'
      status:
        readOnly: true
        allOf:
          - $ref: './enum.client-management-operation-status.yaml'
      requested_by_user_id:
        readOnly: true
        allOf:
          - $ref: './null.uuid.yaml'
      created_at:
        type: string
        format: date-time
        readOnly: true
      started_at:
        readOnly: true
        allOf:
          - $ref: './null.time.response.yaml'
      completed_at:
        readOnly: true
        allOf:
          - $ref: './null.time.response.yaml'
      execution_time:
        type: string
        format: date-time
        readOnly: true
