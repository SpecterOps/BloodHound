type: object
description: |
  Alert webhook resource — a joined view of the `alert_channels`, `alert_webhooks`
  for a single webhook destination. The HMAC secret value is never included in this view;
  it is only returned at create or rotate time.
properties:
  id:
    type: string
    format: uuid
    description: The channel UUID; also serves as the webhook identifier.
  type:
    type: string
    description: Webhook target type.
    enum:
      - generic
      - slack
      - ms-teams
  name:
    type: string
  description:
    type: string
  url:
    type: string
    format: uri
  health:
    type: number
    format: double
    minimum: 0
    maximum: 1
    description: Rolling health score in [0, 1], where 1 is fully healthy.
  attempts:
    type: integer
    format: int32
    description: Total dispatch attempts observed for this webhook.
  failures:
    type: integer
    format: int32
    description: Total failed dispatch attempts observed for this webhook.
  last_error:
    $ref: './null.string.yaml'
  last_errored_at:
    $ref: './null.time.yaml'
  last_succeeded_at:
    $ref: './null.time.yaml'
  created_at:
    type: string
    format: date-time
  created_by:
    type: string
  updated_at:
    type: string
    format: date-time
  updated_by:
    type: string
  disabled_at:
    $ref: './null.time.yaml'
  disabled_by:
    $ref: './null.string.yaml'
