type: object
properties:
  node_id:
    type: integer
    format: int64
    readOnly: true
    example: 1234567890
  kinds:
    type: array
    items:
      type: object
      required:
        - name
        - node_kind_id
      properties:
        node_kind_id:
          type: integer
          format: int32
          nullable: true
          description: Schema node kind ID, or null if the kind is not registered in schema_node_kinds
        name:
          type: string
          description: The kind name from the graph node
  properties:
    type: object
    properties:
      objectid:
        type: string
      name:
        type: string
      displayName:
        type: string
      lastSeen:
        type: string
        format: date-time
    additionalProperties: true
