type: object
description: |
  Describes a single alert event type registered with the system along with the
  payload schema versions supported for that type. Used by clients to populate
  selectors when configuring alert subscriptions.
properties:
  type:
    type: string
    description: Event type identifier.
  versions:
    type: array
    description: Payload schema versions supported for this event type.
    items:
      type: string
