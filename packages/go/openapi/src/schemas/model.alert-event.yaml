type: object
description: |
  Alert event resource. Events are system-generated source signals that fan out
  into per-channel delivery attempts. The API exposes events as read-only; they
  are not mutable through this API surface.
properties:
  id:
    type: string
    format: uuid
  type:
    type: string
    description: Event type identifier, e.g. an alert kind name.
  message:
    type: string
  data:
    type: object
    description: Event payload (`JSONB`); shape varies per event type.
    additionalProperties: true
  created_at:
    type: string
    format: date-time
  attempts_queued_at:
    type: string
    format: date-time
    nullable: true
    description: |
      Timestamp at which delivery attempts were queued for this event. `null`
      when the event has not yet been dispatched (matches the `delivered`
      filter on the list endpoint).
