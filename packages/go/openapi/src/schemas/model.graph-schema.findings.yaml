type: object
properties:
  name:
    type: string
    description: The unique identifier name of the schema finding.
    example: Extension_Finding_1
  display_name:
    type: string
    description: The human-readable name of the schema finding.
    example: Generic Finding 1
  type:
    type: string
    description: The finding type, indicating whether the finding is relationship-based or list-based.
    enum:
      - Relationship
      - List
    example: Relationship
  environment_id:
    type: integer
    format: int32
    description: The ID of the schema environment this finding belongs to.
    example: 1
  extension_id:
    type: integer
    format: int32
    description: The ID of the graph schema extension this finding belongs to.
    example: 2

