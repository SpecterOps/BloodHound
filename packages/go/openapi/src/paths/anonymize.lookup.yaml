parameters:
  - $ref: './../parameters/header.prefer.yaml'
get:
  operationId: LookupAnonymizedData
  summary: Look up anonymized name mappings
  description:
    Searches the translation table for entries matching the given query string.
    Matches against both original and anonymized names using case-insensitive
    partial matching. Returns up to 100 results.
  tags:
    - Database
    - Community
  parameters:
    - name: query
      in: query
      required: true
      description: Search string to match against original or anonymized names.
      schema:
        type: string
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        original_name:
                          type: string
                        anonymized_name:
                          type: string
                        object_type:
                          type: string
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
