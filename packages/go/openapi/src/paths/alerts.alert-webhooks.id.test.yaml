parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - $ref: './../parameters/path.alert-webhook-id.yaml'

post:
  operationId: TestAlertWebhook
  summary: Test Alert Webhook
  description: |
    Synchronously dispatches a mock payload for the given `event_type` to the
    webhook's target URL using the current HMAC secret. No `alert_attempts`
    row is persisted. The handler returns `200` for both successful and failed
    upstream deliveries; the `status_code` and `error` fields in the response
    body surface the upstream outcome.
  tags:
    - Alerts
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          description: Request body for dispatching a mock payload to an alert webhook.
          required:
            - event_type
            - version
          properties:
            event_type:
              type: string
              description: |
                The alert event type to mock in the dispatched payload. The server builds
                a representative payload for the given type using the webhook's current
                HMAC secret.
            version:
              type: string
              description: |
                Payload schema version for the supplied `event_type`. Must be one of
                the versions advertised for that type by
                `GET /api/v2/alert-event-types`.

  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                description: |
                  Result of dispatching a mock payload to an alert webhook. The handler returns
                  this body with a `200` status code on both successful and failed upstream
                  deliveries; the `status_code` and `error` fields surface the upstream outcome.
                properties:
                  status_code:
                    type: integer
                    description: HTTP status code returned by the webhook target.
                    nullable: true
                  error:
                    $ref: './../schemas/null.string.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
