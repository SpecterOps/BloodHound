parameters:
  - $ref: "./../parameters/header.prefer.yaml"
get:
  operationId: ListAttackPathFindings
  summary: List attack path findings
  description: |
    Returns a unified, paginated list of attack path findings. Both relationship and list findings are returned when no filters are applied.
  tags:
    - Attack Paths
    - Enterprise
  parameters:
    - name: sort_by
      description: |
        Sortable columns are `severity`, `finding_type`, `finding`, `platform`, `environment_id`, `environment_name`,
        `zone_id`, `zone_name`, `source_principal_id`, `source_principal_kind`, `source_principal_name`,
        `target_principal_id`, `target_principal_kind`, `target_principal_name`, `status`, `first_seen`, `last_seen`.
      in: query
      schema:
        $ref: "./../schemas/api.params.query.sort-by.yaml"
    - name: severity
      description: Filter by severity level.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: finding_type
      description: Filter by finding type. When not provided, both types are returned.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: finding
      description: Filter by finding name.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: platform
      description: Filter by platform.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: environment_id
      description: Filter by environment identifier.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: environment_name
      description: Filter by environment display name.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: zone_id
      description: Filter by zone identifier.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: zone_name
      description: Filter by zone name (e.g. "Tier Zero").
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: source_principal_id
      description: Filter by source principal identifier.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: source_principal_kind
      description: Filter by source principal kind.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: source_principal_name
      description: Filter by source principal display name.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: target_principal_id
      description: Filter by target principal identifier.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: target_principal_kind
      description: Filter by target principal kind.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: target_principal_name
      description: Filter by target principal display name.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: status
      description: Filter by finding status.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: first_seen
      description: Filter by first seen timestamp.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - name: last_seen
      description: Filter by last seen timestamp.
      in: query
      schema:
        $ref: "./../schemas/api.params.predicate.filter.string.yaml"
    - $ref: "./../parameters/query.skip.yaml"
    - $ref: "./../parameters/query.limit.yaml"
  responses:
    200:
      description: OK
      content:
        text/csv:
          schema:
            type: string
            format: binary
          examples:
            Unified CSV export:
              value: |
                severity,finding_type,finding,platform,environment_id,environment_name,zone_id,zone_name,source_principal_id,source_principal_kind,source_principal_name,target_principal_id,target_principal_kind,target_principal_name,status,first_seen,last_seen
                critical,relationship,Tier Zero Generic Write,Active Directory,S-1-5-21-1974516972-3116780949-2584384717,CORP1.LAB.HOME-LABS.LOL,1,Tier Zero,RPATTON@CORP1.LAB.HOME-LABS.LOL,User,Robert Patton,ADMIN@CORP1.LAB.HOME-LABS.LOL,User,Domain Admin,active,2026-04-11T00:30:18Z,2026-04-14T16:57:35Z
                high,list,Kerberoasting,Active Directory,S-1-5-21-1974516972-3116780949-2584384717,CORP1.LAB.HOME-LABS.LOL,1,Tier Zero,,,,PSX_D_BA@CORP1.LAB.HOME-LABS.LOL,User,Backup Admin,accepted,2026-04-11T00:30:18Z,2026-04-14T16:57:35Z
        application/json:
          schema:
            allOf:
              - $ref: "./../schemas/api.response.pagination.yaml"
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        severity:
                          type: string
                          description: Severity level.
                          enum: [critical, high, moderate, low]
                        finding_type:
                          type: string
                          description: The type of finding.
                          enum: [relationship, list]
                        finding:
                          type: string
                          description: Finding name.
                        platform:
                          type: string
                          description: Platform the finding belongs to.
                        environment_id:
                          type: string
                          description: Environment identifier.
                        environment_name:
                          type: string
                          description: Human-readable environment display name resolved from the graph. Falls back to environment_id when unavailable.
                        zone_id:
                          type: integer
                          description: Zone identifier (asset group tag id).
                        zone_name:
                          type: string
                          description: Human-readable zone name. Empty when the finding is not tied to a named zone.
                        source_principal_id:
                          type: string
                          description: Source principal identifier. Omitted for list findings.
                        source_principal_kind:
                          type: string
                          description: Source principal kind. Omitted for list findings.
                        source_principal_name:
                          type: string
                          description: Source principal display name resolved from principal properties. Empty when unavailable or for list findings.
                        target_principal_id:
                          type: string
                          description: Target principal identifier.
                        target_principal_kind:
                          type: string
                          description: Target principal kind.
                        target_principal_name:
                          type: string
                          description: Target principal display name resolved from principal properties. Empty when unavailable.
                        status:
                          type: string
                          description: Finding status.
                          enum: [active, accepted, remediated, deprecated]
                        first_seen:
                          type: string
                          format: date-time
                          description: Timestamp of when the finding was first created.
                        last_seen:
                          type: string
                          format: date-time
                          description: Timestamp of last update.
          examples:
            Mixed findings (relationship and list):
              summary: Unified response with both finding types
              value:
                count: 2
                skip: 0
                limit: 10
                data:
                  - severity: "critical"
                    finding_type: "relationship"
                    finding: "Tier Zero Generic Write"
                    platform: "Active Directory"
                    environment_id: "S-1-5-21-1974516972-3116780949-2584384717"
                    environment_name: "CORP1.LAB.HOME-LABS.LOL"
                    zone_id: 1
                    zone_name: "Tier Zero"
                    source_principal_id: "RPATTON@CORP1.LAB.HOME-LABS.LOL"
                    source_principal_kind: "User"
                    source_principal_name: "Robert Patton"
                    target_principal_id: "ADMIN@CORP1.LAB.HOME-LABS.LOL"
                    target_principal_kind: "User"
                    target_principal_name: "Domain Admin"
                    status: "active"
                    first_seen: "2026-04-11T00:30:18.491666Z"
                    last_seen: "2026-04-14T16:57:35.675609Z"
                  - severity: "high"
                    finding_type: "list"
                    finding: "Kerberoasting"
                    platform: "Active Directory"
                    environment_id: "S-1-5-21-1974516972-3116780949-2584384717"
                    environment_name: "CORP1.LAB.HOME-LABS.LOL"
                    zone_id: 1
                    zone_name: "Tier Zero"
                    source_principal_id: ""
                    source_principal_kind: ""
                    source_principal_name: ""
                    target_principal_id: "PSX_D_BA@CORP1.LAB.HOME-LABS.LOL"
                    target_principal_kind: "User"
                    target_principal_name: "Backup Admin"
                    status: "accepted"
                    first_seen: "2026-04-11T00:30:18.491666Z"
                    last_seen: "2026-04-14T16:57:35.675609Z"
    400:
      $ref: "./../responses/bad-request.yaml"
    401:
      $ref: "./../responses/unauthorized.yaml"
    403:
      $ref: "./../responses/forbidden.yaml"
    404:
      $ref: "./../responses/not-found.yaml"
    429:
      $ref: "./../responses/too-many-requests.yaml"
    500:
      $ref: "./../responses/internal-server-error.yaml"
