parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: ListAlertAttempts
  summary: List Alert Attempts
  description: |
    Returns a paginated list of alert delivery attempts. Composite-key filters
    (`alert_id`, `channel_id`, `event_id`) compose to support per-alert,
    per-webhook, per-event, and single-row views.
  tags:
    - Alerts
    - Enterprise
  parameters:
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
    - name: sort_by
      in: query
      description: |
        Sortable columns are `created_at`, `succeeded_at`, `next_attempt_at`,
        `attempts`. Default `-created_at` (most recent first).
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: alert_id
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.uuid.yaml'
    - name: channel_id
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.uuid.yaml'
    - name: event_id
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.uuid.yaml'
    - name: succeeded
      in: query
      description: |
        When set to `true`, returns only rows with `succeeded_at IS NOT NULL`.
      schema:
        $ref: './../schemas/api.params.predicate.filter.boolean.yaml'
    - $ref: './../parameters/query.created-at.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      attempts:
                        type: array
                        items:
                          $ref: './../schemas/model.alert-attempt.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
