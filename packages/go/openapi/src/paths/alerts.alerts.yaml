parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: ListAlerts
  summary: List Alerts
  description: Returns a paginated list of alerts with their embedded subscriptions.
  tags:
    - Alerts
    - Enterprise
  parameters:
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
    - name: sort_by
      in: query
      description: Sortable columns are `name`, `created_at`, `updated_at`. Default `name` ascending.
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: name
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.string.yaml'
    - name: disabled
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.boolean.yaml'
    - $ref: './../parameters/query.created-at.yaml'
    - $ref: './../parameters/query.updated-at.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      alerts:
                        type: array
                        items:
                          $ref: './../schemas/model.alert.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

post:
  operationId: CreateAlert
  summary: Create Alert
  description: |
    Creates a new alert with the supplied subscription bindings. The
    `subscriptions` array is required but may be empty.
  tags:
    - Alerts
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          description: |
            Request body for creating an alert. The `subscriptions` array is required but
            may be empty to create an alert with no channel bindings.
          required:
            - name
            - subscriptions
          properties:
            name:
              type: string
            description:
              type: string
            subscriptions:
              type: array
              items:
                $ref: './../schemas/model.alert-subscription-request.yaml'
  responses:
    201:
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  alert:
                    $ref: './../schemas/model.alert.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
