parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - $ref: './../parameters/path.alert-webhook-id.yaml'

get:
  operationId: GetAlertWebhook
  summary: Get Alert Webhook
  description: Returns a single alert webhook by ID.
  tags:
    - Alerts
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  webhook:
                    $ref: './../schemas/model.alert-webhook.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

patch:
  operationId: UpdateAlertWebhook
  summary: Update Alert Webhook
  description: Partially updates an alert webhook by ID. Only fields present in the request body are modified.
  tags:
    - Alerts
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          minProperties: 1
          description: |
            Partial update for an alert webhook. At least one field is required. Only
            fields present in the request body are modified.
          properties:
            name:
              type: string
            description:
              type: string
            url:
              type: string
              format: uri
            type:
              type: string
              enum:
                - generic
                - slack
                - ms-teams
            disabled:
              type: boolean
              description: |
                Set to `true` to disable the webhook (populates `disabled_at`/`disabled_by`),
                `false` to re-enable.
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  webhook:
                    $ref: './../schemas/model.alert-webhook.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    409:
      description: |
        **Conflict**
        The supplied `url` collides with another alert webhook
      content:
        application/json:
          schema:
            $ref: './../schemas/api.error-wrapper.yaml'
          example:
            http_status: 409
            timestamp: 2026-05-21T19:27:43.866Z
            request_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
            errors:
              - context: alert-webhooks
                message: An alert webhook with the supplied URL already exists.
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

delete:
  operationId: DeleteAlertWebhook
  summary: Delete Alert Webhook
  description: |
    Deletes an alert webhook. Cascades to `alert_webhook_secrets`,
    `alert_subscriptions`, and `alert_attempts` rows that reference this
    webhook.
  tags:
    - Alerts
    - Enterprise
  responses:
    204:
      $ref: './../responses/no-content.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
