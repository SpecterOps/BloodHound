parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - name: kind_name
    description: Kind Name
    in: path
    required: true
    schema:
      type: string
get:
  operationId: GetCustomNode
  summary: Get custom node
  description: |
    Retrieve the configuration for a specific custom node kind.
    Returns the display settings and metadata for the requested node kind.
  tags:
    - Custom Node Management
    - Community
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            $ref: './../schemas/model.custom-node.yaml'
          example:
            id: 1
            kindName: "KindA"
            config:
              icon:
                type: "font-awesome"
                name: "house"
                color: "#FFFFFF"
    401:
      $ref: './../responses/unauthorized.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
put:
  operationId: UpdateCustomNode
  summary: Update custom node
  description: |
    This endpoint updates an existing node kind along with optional display metadata such as icons and colors.
    The provided configuration controls how nodes of the specified kinds are interpreted and rendered in the UI.
    Only free, solid-style Font Awesome icons are supported. Hex color codes must follow the format #RGB or #RRGGBB.
    If no valid icon or color is provided, the system will fall back to a question mark icon and a white background color.
  tags:
    - Custom Node Management
    - Community
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            config:
              $ref: './../schemas/model.custom-node.config.yaml'
        example:
          config:
            icon:
              type: "font-awesome"
              name: "house"
              color: "#333"
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            $ref: './../schemas/model.custom-node.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    409:
      description: |
        **Conflict**
        Kind name is owned by a schema extension
      content:
        application/json:
          schema:
            $ref: './../schemas/api.error-wrapper.yaml'
          example:
            http_status: 409
            timestamp: 2024-02-19T19:27:43.866Z
            request_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
            errors:
              - context: customnodes
                message: "Conflict: kind name is owned by a schema extension"
    500:
      $ref: './../responses/internal-server-error.yaml'
delete:
  operationId: DeleteCustomNode
  deprecated: true
  summary: Delete custom node (Deprecated)
  description: |
    **Deprecated**: This endpoint is no longer supported and will return 410 Gone.
  tags:
    - Custom Node Management
    - Community
    - Enterprise
  responses:
    401:
      $ref: './../responses/unauthorized.yaml'
    410:
      description: Gone - This endpoint has been deprecated
      content:
        application/json:
          schema:
            $ref: './../schemas/api.error-wrapper.yaml'
