parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - name: client_id
    description: Client ID
    in: path
    required: true
    schema:
      type: string
      format: uuid

post:
  operationId: QueueClientManagementOperation
  summary: Queues a management operation
  description: |
    Endpoint for users to queue a management operation for a client.
  tags:
    - Clients
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './../schemas/model.client-management-operation-queue-request.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: './../schemas/model.client-management-operation.yaml'
    201:
      description: Created
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: './../schemas/model.client-management-operation.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
