parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: ListAlertEvents
  summary: List Alert Events
  description: Returns a paginated list of alert events. Events are system-generated and read-only via the API.
  tags:
    - Alerts
    - Enterprise
  parameters:
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
    - name: sort_by
      in: query
      description: Sortable columns are `created_at`, `attempts_queued_at`. Default `-created_at` (most recent first).
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: type
      in: query
      schema:
        $ref: './../schemas/api.params.predicate.filter.string.yaml'
    - $ref: './../parameters/query.created-at.yaml'
    - name: delivered
      in: query
      description: |
        When set to `false`, returns only events with `attempts_queued_at IS NULL`
        (events that have not yet had delivery attempts queued).
      schema:
        $ref: './../schemas/api.params.predicate.filter.boolean.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          $ref: './../schemas/model.alert-event.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
