parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - name: alert_id
    description: ID of an alert.
    in: path
    required: true
    schema:
      type: string
      format: uuid
      description: uuidv4

get:
  operationId: GetAlert
  summary: Get Alert
  description: Returns a single alert by ID with its embedded subscriptions.
  tags:
    - Alerts
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  alert:
                    $ref: './../schemas/model.alert.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

patch:
  operationId: UpdateAlert
  summary: Update Alert
  description: |
    Partially updates an alert by ID. All top-level fields are optional. If
    `subscriptions` is present, the supplied array fully replaces the current
    subscription set for this alert in one transaction (delete-omitted,
    insert-new, update-existing by composite key `(channel_id, event_type)`).
    Omit `subscriptions` to leave bindings unchanged.
  tags:
    - Alerts
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          description: |
            Partial update for an alert. All fields are optional. If `subscriptions` is
            present, the supplied array fully replaces the current subscription set for
            this alert in one transaction (delete-omitted / insert-new / update-existing
            by composite key `(channel_id, event_type)`). Omit `subscriptions` to leave
            bindings unchanged.
          properties:
            name:
              type: string
            description:
              type: string
            disabled:
              type: boolean
            subscriptions:
              type: array
              items:
                $ref: './../schemas/model.alert-subscription-request.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  alert:
                    $ref: './../schemas/model.alert.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

delete:
  operationId: DeleteAlert
  summary: Delete Alert
  description: |
    Deletes an alert. Cascades to `alert_subscriptions` and `alert_attempts`
    rows referencing this alert.
  tags:
    - Alerts
    - Enterprise
  responses:
    204:
      $ref: './../responses/no-content.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
