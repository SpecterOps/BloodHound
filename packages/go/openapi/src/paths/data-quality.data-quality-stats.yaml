parameters:
  - $ref: './../parameters/header.prefer.yaml'
get:
  operationId: GetDataQualityStats
  summary: Get OpenGraph data quality stats
  description: Time series list of OpenGraph extension data quality stats by environment
  tags:
    - Data Quality
    - Community
    - Enterprise
  parameters:
    - name: sort_by
      description: Sortable columns are id, run_id, schema_extension_id, schema_environment_kind_id, environment_id, metric_type, metric_name, metric_value, kind_id, created_at, updated_at.
      in: query
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: start_date
      description: Beginning datetime of range (inclusive) in RFC-3339 format; Defaults
        to current datetime minus 30 days
      in: query
      schema:
        type: string
        format: date-time
    - name: end_date
      description: Ending datetime of range (exclusive) in RFC-3339 format; Defaults
        to current datetime
      in: query
      schema:
        type: string
        format: date-time
    - name: environment_id
      description: Filter stats by OpenGraph environment ID
      in: query
      schema:
        type: string
    - name: extension_id
      description: Filter stats by OpenGraph extension ID
      in: query
      schema:
        type: integer
        format: int32
    - name: schema_environment_kind_id
      description: Filter stats by OpenGraph schema environment kind ID
      in: query
      schema:
        type: integer
        format: int32
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - $ref: './../schemas/api.response.time-window.yaml'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './../schemas/model.data-quality-stat.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
