parameters:
  - $ref: './../parameters/header.prefer.yaml'
get:
  operationId: GetDataQualitySourceObjectCountSummaries
  summary: Get data quality source object count summaries
  description: Time series list of total object counts grouped by object count run. Use source_kind to scope totals to a source, or omit it for all objects.
  tags:
    - Data Quality
    - Community
    - Enterprise
  parameters:
    - name: source_kind
      description: Filter by source kind.
      in: query
      schema:
        type: string
    - name: node_kind
      description: Filter by node kind.
      in: query
      schema:
        type: string
    - name: run_id
      description: Filter by collection run ID.
      in: query
      schema:
        type: string
        format: uuid
    - name: latest
      description: Return the latest object count run in the selected time range. Cannot be combined with run_id.
      in: query
      allowEmptyValue: true
      schema:
        type: boolean
    - name: sort_by
      description: Sortable columns are count, run_id, created_at.
      in: query
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: start
      description: Beginning datetime of range (inclusive) in RFC-3339 format; Defaults
        to current datetime minus 30 days
      in: query
      schema:
        type: string
        format: date-time
    - name: end
      description: Ending datetime of range (exclusive) in RFC-3339 format; Defaults
        to current datetime
      in: query
      schema:
        type: string
        format: date-time
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - $ref: './../schemas/api.response.time-window.yaml'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './../schemas/model.data-quality-source-object-count-summary.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
