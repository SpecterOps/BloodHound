parameters:
  - $ref: './../parameters/header.prefer.yaml'
get:
  operationId: GetDataQualityNodeKindAggregations
  summary: Get Data Quality node kind aggregations
  description: >
    Gets historical schema-defined node kind counts aggregated by environment kind.
  tags:
    - Data Quality
    - Community
    - Enterprise
  parameters:
    - name: environment_kind
      description: Schema environment kind to query.
      in: query
      required: true
      schema:
        type: string
    - name: source_kind
      description: Optional source kind filter for built-in environment views extended by OpenGraph schema.
      in: query
      schema:
        type: string
    - name: include_builtin
      description: Whether built-in schema extension stats should be included.
      in: query
      schema:
        type: boolean
        default: true
    - name: sort_by
      description: Sortable columns are created_at, updated_at, metric_name, and metric_value.
      in: query
      schema:
        $ref: './../schemas/api.params.query.sort-by.yaml'
    - name: start
      description: Beginning datetime of range (inclusive) in RFC-3339 format; Defaults
        to current datetime minus 30 days.
      in: query
      schema:
        type: string
        format: date-time
    - name: end
      description: Ending datetime of range (exclusive) in RFC-3339 format; Defaults
        to current datetime.
      in: query
      schema:
        type: string
        format: date-time
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - $ref: './../schemas/api.response.time-window.yaml'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './../schemas/model.data-quality-node-kind-stat.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
