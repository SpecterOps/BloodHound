parameters:
  - $ref: './../parameters/header.prefer.yaml'
post:
  operationId: StartClientManagementOperation
  summary: Notifies the API of a management operation start
  description: |
    Endpoint for clients to start a management operation and mark the start time.

    Note: caller must be a client. For users, this endpoint will return a 403 as
    they are not expected or allowed to call this endpoint.
  tags:
    - Clients
    - Enterprise
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './../schemas/model.client-management-operation-start-request.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: './../schemas/model.client-management-operation.yaml'
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: './../schemas/api.error-wrapper.yaml'
          example:
            http_status: 409
            timestamp: 2026-07-01T13:44:43.247Z
            request_id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
            errors:
              - context: ""
                message: invalid management operation status transition
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
