parameters:
  - $ref: './../parameters/header.prefer.yaml'
  - $ref: './../parameters/path.alert-webhook-id.yaml'

post:
  operationId: RotateAlertWebhookSecret
  summary: Rotate Alert Webhook Secret
  description: |
    Generates a new HMAC secret for an alert webhook. The new plaintext secret
    is returned on this response only and replaces the prior secret.
  tags:
    - Alerts
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  webhook_secret:
                    type: object
                    description: |
                      Response payload from rotating an alert webhook's HMAC secret. The plaintext
                      secret value is returned only on rotation; subsequent reads of the webhook do
                      not expose it.
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: The channel UUID for the webhook whose secret was rotated.
                      hmac_secret:
                        type: string
                        description: The newly generated base64-encoded HMAC secret.
                      created_at:
                        type: string
                        format: date-time
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
