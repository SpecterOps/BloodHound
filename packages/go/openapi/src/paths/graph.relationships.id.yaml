parameters:
  - name: relationship_id
    in: path
    required: true
    description: The relationship id assigned by the graph
    schema:
      type: integer
      format: int64
  - name: include-info
    in: query
    required: false
    description: |
      When false or omitted, excludes entity panel information.
      When true, returns relationship details with entity panel information included.
    schema:
      type: boolean
get:
  operationId: GetRelationshipByID
  summary: Get Relationship by Graph Relationship ID
  description: "**Experimental** - Returns the details of a graph relationship identified by its graph-assigned integer ID"
  tags:
    - OpenGraph (Experimental)
    - Community
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                anyOf:
                  - $ref: "./../schemas/model.relationship-details.yaml"
                  - $ref: "./../schemas/model.relationship-details-with-info.yaml"
    400:
      $ref: "./../responses/bad-request.yaml"
    401:
      $ref: "./../responses/unauthorized.yaml"
    403:
      $ref: "./../responses/forbidden.yaml"
    404:
      $ref: "./../responses/not-found.yaml"
    429:
      $ref: "./../responses/too-many-requests.yaml"
    500:
      $ref: "./../responses/internal-server-error.yaml"
