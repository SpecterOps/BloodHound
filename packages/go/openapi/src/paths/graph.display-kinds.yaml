parameters:
  - $ref: './../parameters/header.prefer.yaml'
get:
  operationId: GetDisplayKinds
  summary: Get display kinds
  description: Gets display kinds
  tags:
    - Graph
    - Community
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  node_kinds:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        display_name:
                          type: string
                        extension_display_name:
                          type: string
                        extension_id:
                          type: number
                        icon:
                          type: object
                          properties:
                            name:
                              type: string
                            type:
                              type: string
                            color:
                              type: string
                  edge_kinds:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        name:
                          type: string
                        display_name:
                          type: string

    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
