parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: GetAnalysisRequest
  summary: Gets analysis request information
  description: Flags the API to request the information of an analysis request.
  tags:
    - Datapipe
    - Community
    - Enterprise
  responses:
    200:
      description: OK. An analysis request is currently pending; its details are returned in the response body.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  requested_by:
                    type: string
                  request_type:
                    type: string
                  requested_at:
                    type: string
                    format: date-time
                  delete_all_graph:
                    type: boolean
                  delete_sourceless_graph:
                    type: boolean
                  delete_source_kinds:
                    type: array
                    items:
                      type: string
                  delete_relationships:
                    type: array
                    items:
                      type: string
    204:
      description: No Content. The request was successful but no analysis is currently pending.
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

put:
  operationId: StartAnalysis
  summary: Start analysis
  description: |
    Submits an analysis request attributed to the authenticated user. The
    endpoint is idempotent — at most one analysis request can be pending at a
    time. Returns 202 Accepted when this call accepted the new request, or 200
    OK when a request was already pending. The currently pending request is
    returned in the response body in both cases.
  tags:
    - Datapipe
    - Community
    - Enterprise
  responses:
    200:
      description: OK. A request was already pending; its details are returned in the response body.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  requested_by:
                    type: string
                  request_type:
                    type: string
                  requested_at:
                    type: string
                    format: date-time
                  delete_all_graph:
                    type: boolean
                  delete_sourceless_graph:
                    type: boolean
                  delete_source_kinds:
                    type: array
                    items:
                      type: string
                  delete_relationships:
                    type: array
                    items:
                      type: string
    202:
      description: Accepted. The request was accepted by this call; its details are returned in the response body.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  requested_by:
                    type: string
                  request_type:
                    type: string
                  requested_at:
                    type: string
                    format: date-time
                  delete_all_graph:
                    type: boolean
                  delete_sourceless_graph:
                    type: boolean
                  delete_source_kinds:
                    type: array
                    items:
                      type: string
                  delete_relationships:
                    type: array
                    items:
                      type: string
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'

delete:
  operationId: CancelAnalysisRequest
  summary: Cancels an analysis request
  description: Flags the API to request the cancellation of analyzing ingest data.
  tags:
    - Datapipe
    - Community
    - Enterprise
  responses:
    202:
      $ref: './../responses/no-content.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    404:
      $ref: './../responses/not-found.yaml'
    409:
      description: Conflict. You cannot cancel an analysis request because a deletion request is pending
      content:
        application/json:
          schema:
            $ref: './../schemas/api.error-wrapper.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
