parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: ListAlertEventTypes
  summary: List Alert Event Types
  description: |
    Returns the list of alert event types registered with the system along with
    the payload schema versions supported for each type. The response is not
    paginated or filtered.
  tags:
    - Alerts
    - Enterprise
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  event_types:
                    type: array
                    items:
                      $ref: './../schemas/model.alert-event-type.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    403:
      $ref: './../responses/forbidden.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
