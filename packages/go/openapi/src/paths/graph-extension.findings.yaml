parameters:
  - $ref: './../parameters/header.prefer.yaml'

get:
  operationId: GetGraphSchemaFindings
  summary: List Graph Schema Findings
  description: >
    Returns a paginated list of all graph schema findings across all extensions.
    Use the `skip` and `limit` query parameters to control pagination.
    The `limit` defaults to 1000 when not specified.
  tags:
    - OpenGraph
    - Enterprise
  parameters:
    - $ref: './../parameters/query.skip.yaml'
    - $ref: './../parameters/query.limit.yaml'
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            allOf:
              - $ref: './../schemas/api.response.pagination.yaml'
              - type: object
                properties:
                  data:
                    type: object
                    properties:
                      findings:
                        type: array
                        items:
                          $ref: './../schemas/model.graph-extension.findings.yaml'
          examples:
            Success:
              summary: Paginated list of schema findings
              value:
                count: 2
                skip: 0
                limit: 1000
                data:
                  findings:
                    - name: Extension_Finding_1
                      display_name: Finding 1
                      type: Relationship
                      environment_id: 1
                      extension_id: 1
                    - name: Extension_Finding_2
                      display_name: Finding 2
                      type: List
                      environment_id: 2
                      extension_id: 2
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
