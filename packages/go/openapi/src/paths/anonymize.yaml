parameters:
  - $ref: './../parameters/header.prefer.yaml'
post:
  operationId: AnonymizeData
  summary: Anonymize graph data
  description:
    Replaces all identifiable node properties (name, displayname, description,
    email, operatingsystem, title) with generated uppercase pseudonyms. A
    translation table is stored in PostgreSQL so the operation can be reversed.
    Returns 409 Conflict if data is already anonymized.
  tags:
    - Database
    - Community
  responses:
    200:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  anonymized:
                    type: boolean
                  entries_count:
                    type: integer
                    description: Number of property values that were anonymized.
    400:
      $ref: './../responses/bad-request.yaml'
    401:
      $ref: './../responses/unauthorized.yaml'
    409:
      description: Data is already anonymized. Restore first before re-anonymizing.
    429:
      $ref: './../responses/too-many-requests.yaml'
    500:
      $ref: './../responses/internal-server-error.yaml'
