compressionLevel: mixed

enableGlobalCache: false

nmMode: hardlinks-global

nodeLinker: node-modules

npmMinimalAgeGate: 3d

# npmPreapprovedPackages:
  # - useful for time critical patches

npmAuditIgnoreAdvisories:
  - '1101851' # fix not currently available - https://github.com/advisories/GHSA-2p57-rm9w-gvfp
  - '1119610' # CVE-2026-44705: tmp path traversal - patch (0.2.7) is outside the ^0.0.33 range declared by patch-package (swagger-ui-react transitive dep); tmp is never called with user-controlled input in this chain - https://github.com/advisories/GHSA-ph9p-34f9-6g65

plugins:
  - path: .yarn/plugins/nested-workspace/plugin-nested-workspace.js

supportedArchitectures:
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
  os:
    - current
    - darwin
    - linux
    - win32

yarnPath: .yarn/releases/yarn-4.13.0.cjs
