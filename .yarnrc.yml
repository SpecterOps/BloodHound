compressionLevel: mixed

enableGlobalCache: false

nmMode: hardlinks-global

nodeLinker: node-modules

npmMinimalAgeGate: 3d

# tmp@0.2.6 is pinned in package.json for CVE-2026-44705.
# TODO: this can be removed after the age gate passes.
npmPreapprovedPackages:
  - tmp

npmAuditIgnoreAdvisories:
  - "1101851" # fix not currently available - https://github.com/advisories/GHSA-2p57-rm9w-gvfp
  - "1120679" # affects versions of esbuild pulled in through Deno; this repo uses esbuild via node-based tooling  only (vite, tsx). Remove once dependent packages have been updated to versions that support esbuild >= 0.28.1 - https://github.com/advisories/GHSA-gv7w-rqvm-qjhr

plugins:
  - path: .yarn/plugins/nested-workspace/plugin-nested-workspace.js

supportedArchitectures:
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
  os:
    - current
    - darwin
    - linux
    - win32

yarnPath: .yarn/releases/yarn-4.13.0.cjs
